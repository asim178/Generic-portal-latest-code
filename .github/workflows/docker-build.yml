name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # (Optional but recommended for first run)
      - name: Verify Dockerfile location
        run: |
          ls Generic-portal-latest-code/project/backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Generic-portal-latest-code/project/backend
          file: ./Generic-portal-latest-code/project/backend/Dockerfile
          push: true
          tags: asim12344321/generic-portal-latest-code:latest