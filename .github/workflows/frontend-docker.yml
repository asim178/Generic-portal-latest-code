name: Build & Push Frontend Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 4️⃣ Build & push frontend image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./project                 # project folder containing package.json, dist, Dockerfile.frontend
          file: ./project/Dockerfile.frontend
          push: true
          tags: asim12344321/generic-portal-frontend:latest
